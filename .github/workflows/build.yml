name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: playlist-fetcher
            asset_name: playlist-fetcher-linux
          - os: windows-latest
            artifact_name: playlist-fetcher.exe
            asset_name: playlist-fetcher-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --release

      - name: Package Windows build
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\release\playlist-fetcher.exe dist\
          echo "Requires spotdl, scdl, and ffmpeg on PATH. See github.com/howdydev/playlist-fetcher" > dist\README.txt
          Compress-Archive -Path dist\* -DestinationPath playlist-fetcher-windows.zip
        shell: pwsh

      - name: Upload Windows zip
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: playlist-fetcher-windows.zip

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.artifact_name }}
